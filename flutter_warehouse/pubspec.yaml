name: flutter_warehouse
description: Warehouse Management System

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3+1

  # Local storage
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0

  # Barcode scanner
  mobile_scanner: ^5.1.1

  # File picker (CSV import)
  file_picker: ^8.0.3

  # File save & share (mobile)
  path_provider: ^2.1.4
  share_plus: ^9.0.0

  # Web platform utilities
  web: ^0.5.1

  # UI utilities
  intl: ^0.19.0
  flutter_slidable: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#F8F9FA"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
